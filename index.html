<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floki - Grupopixel</title>
    <!-- Tailwind CSS via CDN para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#ecfdf5',
                100: '#d1fae5',
                200: '#a7f3d0',
                300: '#6ee7b7',
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
                700: '#047857',
                800: '#065f46',
                900: '#064e3b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Inter', 'sans-serif'],
            },
            animation: {
              'bounce-slow': 'bounce 3s infinite',
              'float': 'float 6s ease-in-out infinite',
              'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
              'cursor-move': 'cursor-move 10s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              'pulse-glow': {
                '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                '50%': { opacity: '0.6', transform: 'scale(1.05)' },
              },
              'cursor-move': {
                '0%': { top: '80%', left: '80%' },
                '20%': { top: '40%', left: '30%' },
                '25%': { top: '40%', left: '30%', transform: 'scale(0.8)' },
                '30%': { top: '40%', left: '30%', transform: 'scale(1)' },
                '60%': { top: '85%', left: '90%' }, /* Deploy button position approximately */
                '65%': { top: '85%', left: '90%', transform: 'scale(0.8)' }, /* Click */
                '70%': { top: '85%', left: '90%', transform: 'scale(1)' },
                '100%': { top: '80%', left: '80%' },
              },
              'typing': {
                'from': { width: '0' },
                'to': { width: '100%' }
              },
              'blink': {
                '50%': { borderColor: 'transparent' }
              }
            }
          }
        }
      }
    </script>
    
    <!-- Importação de Fontes do Google -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      html { scroll-behavior: smooth; }
    </style>

    <!-- Mapa de Importação para Módulos ES6 (React + Router) -->
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@6.22.3/dist/react-router-dom.production.min.js",
    "@remix-run/router": "https://aistudiocdn.com/@remix-run/router@1.15.3/dist/router.production.min.js",
    "react-router": "https://aistudiocdn.com/react-router@6.22.3/dist/react-router.production.min.js",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
    <!-- Favicon (Ícone da logo sem o nome) -->
    <link rel="icon" type="image/png" href="/pixel-logo-v2.png" />
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <!-- Ponto de montagem da aplicação React -->
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
